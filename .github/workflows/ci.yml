name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements_test.txt
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements_test.txt
      - name: Compile Python sources
        run: python -m compileall -q custom_components tests
      - name: Diff check
        run: git diff --check
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy custom_components/airbnk_ble

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements_test.txt
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements_test.txt
      - name: Run tests with coverage
        run: >
          pytest
          --cov=custom_components.airbnk_ble
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=70
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
