version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "09:00"
      timezone: "America/Los_Angeles"
    cooldown:
      default-days: 3
      semver-patch-days: 3
      semver-minor-days: 7
      semver-major-days: 30
    groups:
      python-routine:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "09:30"
      timezone: "America/Los_Angeles"
    cooldown:
      default-days: 3
    groups:
      github-actions-routine:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
