rules:
  action_setup:
    status: exempt
    comment: The integration does not register Home Assistant service actions.
  appropriate_polling:
    status: exempt
    comment: The integration is driven by Bluetooth advertisements and on-demand BLE commands instead of scheduled polling.
  brands: done
  dependency_transparency:
    status: todo
    comment: A future Home Assistant Core submission still requires extracting the Airbnk protocol and cloud communication into a separately published PyPI library with transparent public releases.
  common_modules: done
  config_flow: done
  config_flow_test_coverage: done
  discovery: done
  docs_actions:
    status: exempt
    comment: The integration does not expose Home Assistant service actions.
  docs_high_level_description: done
  docs_installation_instructions: done
  docs_removal_instructions: done
  entity_event_setup: done
  entity_unique_id: done
  has_entity_name: done
  inject_websession:
    status: todo
    comment: The integration uses Home Assistant managed aiohttp sessions today, but a future external communication library should also accept the injected HA client instead of owning its own transport decisions.
  reconfiguration_flow: done
  runtime_data: done
  async_dependency:
    status: todo
    comment: A future Core-ready extraction still needs to publish the Airbnk communication layer as a separate asyncio-native library.
  unique_config_entry: done
